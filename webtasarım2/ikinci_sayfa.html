<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünya Mutfakları Galerisi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

    
        .back-link {
            align-self: flex-start; 
            text-decoration: none;
            color: #636e72;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #d63031;
        }

      
        .gallery-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #d63031;
            margin-top: 20px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

       
        .food-item {
            text-align: center;
            margin-bottom: 40px;
        }

        h3 {
            color: #2d3436;
            margin-bottom: 15px;
            border-bottom: 2px solid #d63031;
            padding-bottom: 5px;
        }

        img {
            display: block;
            margin: 0 auto;
           object-fit: cover; 
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link"> Ana Sayfaya Dön</a>

    <p class="gallery-title">Dünya Mutfakları Galerisi</p>

    <div class="food-item">
        <h3>Türk Mutfağı</h3>
        <img src="../resimler/turk.jpg" width="300" height="200">
    </div>

    <div class="food-item">
        <h3>Kore Mutfağı</h3>
        <img src="../resimler/kore.jpg" width="300" height="200">
    </div>

    <div class="food-item">
        <h3>Arap Mutfağı</h3>
        <img src="../resimler/arap.jpg" width="300" height="200">
    </div>

    <div class="food-item">
        <h3>Hint Mutfağı</h3>
        <img src="../resimler/hint.jpg" width="300" height="200">
    </div>

    <div class="food-item">
        <h3>Çin Mutfağı</h3>
        <img src="../resimler/çin.jpg" width="300" height="200">
    </div>

    <div class="food-item">
        <h3>Japon Mutfağı</h3>
        <img src="../resimler/japon.jpg" width="300" height="200">
    </div>

</body>
</html>
